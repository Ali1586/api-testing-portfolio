name: API Testing - Postman Collection

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests every day at 9 AM UTC
    - cron: '0 9 * * *'

jobs:
  api-testing:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3
    
    # Setup Node.js
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    # Install dependencies
    - name: Install dependencies
      run: npm install
    
    # Install Newman (Postman CLI)
    - name: Install Newman
      run: npm install -g newman
    
    # Run Postman Collection Tests
    - name: Run Postman Collection Tests
      run: |
        newman run postman_ecommerce_pro.json \
          -e environment.json \
          --reporters cli,json,html,junit \
          --reporter-json-export "./newman/test-results.json" \
          --reporter-html-export "./newman/test-report.html" \
          --reporter-junit-export "./newman/test-results.xml" \
          --bail \
          --verbose
      continue-on-error: true
    
    # Test Specific Workflow - Authentication & Basic CRUD
    - name: Test - Authentication & CRUD Workflow
      run: |
        echo "Testing Authentication Flow..."
        newman run postman_ecommerce_pro.json \
          -e environment.json \
          --folder "1. SETUP & AUTHENTICATION" \
          --reporters cli
        
        echo "Testing CRUD Operations..."
        newman run postman_ecommerce_pro.json \
          -e environment.json \
          --folder "2. CRUD OPERATIONS (Products)" \
          --reporters cli
      continue-on-error: true
    
    # Test Error Handling
    - name: Test - Error Handling & Edge Cases
      run: |
        echo "Testing Error Handling..."
        newman run postman_ecommerce_pro.json \
          -e environment.json \
          --folder "4. ERROR HANDLING & NEGATIVE TESTS" \
          --reporters cli
        
        echo "Testing Edge Cases..."
        newman run postman_ecommerce_pro.json \
          -e environment.json \
          --folder "7. DATA VALIDATION & EDGE CASES" \
          --reporters cli
      continue-on-error: true
    
    # Upload HTML Test Report as Artifact
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: postman-test-reports-node-${{ matrix.node-version }}
        path: |
          newman/test-report.html
          newman/test-results.json
          newman/test-results.xml
        retention-days: 30
    
    # Publish Test Results
    - name: Publish Test Results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: newman/test-results.xml
        check_name: API Test Results
        comment_title: Postman API Test Results
    
    # Create Test Summary
    - name: Create Test Summary
      if: always()
      run: |
        echo "## 🧪 Postman API Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Test Suite:** E-commerce API Testing" >> $GITHUB_STEP_SUMMARY
        echo "**Collection:** postman_ecommerce_pro.json" >> $GITHUB_STEP_SUMMARY
        echo "**Environment:** environment.json" >> $GITHUB_STEP_SUMMARY
        echo "**Run Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f newman/test-results.json ]; then
          echo "**Test Results:**" >> $GITHUB_STEP_SUMMARY
          cat newman/test-results.json | grep -o '"tests":[0-9]*' >> $GITHUB_STEP_SUMMARY || echo "Failed to extract test count" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "[View Detailed Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
    
    # Send Slack Notification (Optional)
    - name: Slack Notification
      if: failure()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "❌ API Tests Failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*API Testing Failed* 🚨\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Results"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }

  # Job: Generate Coverage Report
  coverage:
    runs-on: ubuntu-latest
    needs: api-testing
    if: always()
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download Test Results
      uses: actions/download-artifact@v4
      with:
        path: reports/
    
    - name: Merge Reports
      run: |
        mkdir -p coverage
        echo "# API Test Coverage Report" > coverage/index.md
        echo "" >> coverage/index.md
        echo "## Test Execution Summary" >> coverage/index.md
        echo "- **Total Test Suites:** 10" >> coverage/index.md
        echo "- **Total Test Cases:** 40+" >> coverage/index.md
        echo "- **Coverage Areas:** Authentication, CRUD, Filtering, Error Handling, Cart, Orders, Edge Cases, Headers, Performance, Security" >> coverage/index.md
    
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v3
      with:
        name: test-coverage-report
        path: coverage/